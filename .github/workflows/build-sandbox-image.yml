name: Build sandbox image

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.sandbox"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: true
          tags: ghcr.io/${{ github.repository }}/sandbox:latest
          # Output digest for updating _DEFAULT_IMAGE
      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/${{ github.repository }}/sandbox:latest | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image built: ghcr.io/${{ github.repository }}/sandbox@$DIGEST"
          echo "Update _DEFAULT_IMAGE in server.py to:"
          echo "ghcr.io/${{ github.repository }}/sandbox@$DIGEST"
